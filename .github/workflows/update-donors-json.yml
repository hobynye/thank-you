name: Update donors.json from Google Sheet

on:
  workflow_dispatch:
  schedule:
    # Every 30 minutes, year-round.
    # The workflow exits early unless today is May 15 through June 15.
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Check active season window
        id: season
        run: |
          month_day=$(date -u +"%m-%d")

          if [[ "$month_day" < "05-15" || "$month_day" > "06-15" ]]; then
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "Outside active update window. Skipping."
          else
            echo "active=true" >> "$GITHUB_OUTPUT"
            echo "Inside active update window. Continuing."
          fi

      - name: Check out repository
        if: steps.season.outputs.active == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Download Google Sheet CSV and convert to JSON
        if: steps.season.outputs.active == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
        run: |
          python3 << 'PY'
          import csv
          import json
          import os
          import urllib.request

          url = os.environ["GOOGLE_SHEET_CSV_URL"]

          csv_file = "donors.csv"
          json_file = "donors.json"

          urllib.request.urlretrieve(url, csv_file)

          donors = []

          with open(csv_file, newline="", encoding="utf-8-sig") as f:
              reader = csv.DictReader(f)

              required_columns = [
                  "studentName",
                  "donorOrg",
                  "donorName",
                  "donorAddress",
                  "donation"
              ]

              missing = [c for c in required_columns if c not in reader.fieldnames]
              if missing:
                  raise Exception(f"Missing required columns: {missing}")

              for row in reader:
                  if not row.get("studentName", "").strip():
                      continue

                  donors.append({
                      "studentName": row.get("studentName", "").strip(),
                      "donorOrg": row.get("donorOrg", "").strip(),
                      "donorName": row.get("donorName", "").strip(),
                      "donorAddress": row.get("donorAddress", "").strip(),
                      "donation": row.get("donation", "").strip()
                  })

          with open(json_file, "w", encoding="utf-8") as f:
              json.dump(donors, f, indent=2, ensure_ascii=False)

          print(f"Wrote {len(donors)} donor records to {json_file}")
          PY

      - name: Commit updated donors.json only if changed
        if: steps.season.outputs.active == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add donors.json

          if git diff --cached --quiet; then
            echo "donors.json did not change. No commit or deploy needed."
          else
            git commit -m "Update donors.json from Google Sheet"
            git push
          fi